<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMo Sushi</title>

<link rel="icon" type="image/png" href="logo.png">

<link rel="preconnect" href="https://momo-sushi.base44.app">

<style>
html, body {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
overflow: hidden;
background: #0a0a0a;
}

#loader {
position: absolute;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
color: white;
font-family: Arial, sans-serif;
background: #0a0a0a;
z-index: 2;
}

.spinner {
width: 50px;
height: 50px;
border: 4px solid rgba(255,255,255,0.2);
border-top: 4px solid #ABD828;
border-radius: 50%;
animation: spin 1s linear infinite;
margin-bottom: 15px;
}

@keyframes spin {
to { transform: rotate(360deg); }
}

iframe {
position: absolute;
width: 100%;
height: 100%;
border: none;
opacity: 0;
transition: opacity 0.3s ease;
}
</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
<div>Loading MoMo Sushi...</div>
</div>

<!-- Removed the static 'src' attribute so the script can set it dynamically -->
<iframe id="frame"></iframe>

<script>
const frame = document.getElementById("frame");
const loader = document.getElementById("loader");

// 1. Grab the exact sub-path and query parameters from the browser's address bar
const currentPath = window.location.pathname; 
const currentSearch = window.location.search;   

// 2. Build the target URL for the iframe, preserving the internal App query parameter
const targetBase = "https://momo-sushi.base44.app";
let iframeSrc = targetBase + currentPath;

if (currentSearch) {
    // If the parent URL already has parameters, append hide_badge with an ampersand
    iframeSrc += currentSearch + "&hide_badge=true";
} else {
    // Otherwise, append it normally with a question mark
    iframeSrc += "?hide_badge=true";
}

// 3. Set the calculated source to the iframe before it loads
frame.src = iframeSrc;

frame.onload = function () {
    loader.style.display = "none";
    frame.style.opacity = "1";
};
</script>

</body>
</html>
